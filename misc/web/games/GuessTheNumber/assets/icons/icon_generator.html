<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Accessible Icon Generator</title>

<script src="scripts/speech.js"></script>

<style>

body{
    font-family:sans-serif;
}

canvas{
    border:1px solid #666;
    margin-top:10px;
}

</style>

</head>

<body>

<h1>Game Icon Generator</h1>

<label for="iconStyle">Icon style</label><br>
<select id="iconStyle">
<option value="GN">GN</option>
<option value="123">123</option>
<option value="?">?</option>
<option value="custom">Custom text</option>
</select>

<br><br>

<label for="customText">Custom text</label><br>
<input id="customText" type="text">

<br><br>

<label for="bgColor">Background color</label><br>
<select id="bgColor">
<option value="#000000">Black</option>
<option value="#ffffff">White</option>
<option value="#0044cc">Blue</option>
<option value="#008800">Green</option>
<option value="#880000">Red</option>
<option value="#444444">Gray</option>
</select>

<br><br>

<label for="textColor">Text color</label><br>
<select id="textColor">
<option value="#ffffff">White</option>
<option value="#000000">Black</option>
<option value="#ffff00">Yellow</option>
<option value="#00ffff">Cyan</option>
<option value="#ff8800">Orange</option>
</select>

<br><br>

<button onclick="generatePreview()">Generate Preview</button><br>
<button onclick="downloadIcons()">Generate Download Links</button><br>

<h2>Preview</h2>

<canvas id="previewCanvas" width="192" height="192"></canvas>

<h2>Downloads</h2>

<div id="downloads"></div>

<script>

function getText(){

    const style = document.getElementById("iconStyle").value;
    const custom = document.getElementById("customText").value;

    if(style === "custom" && custom.trim() !== ""){
        return custom;
    }

    return style;
}

function drawIcon(size){

    const canvas = document.createElement("canvas");
    canvas.width = size;
    canvas.height = size;

    const ctx = canvas.getContext("2d");

    const bg = document.getElementById("bgColor").value;
    const fg = document.getElementById("textColor").value;

    const text = getText();

    ctx.fillStyle = bg;
    ctx.fillRect(0,0,size,size);

    ctx.fillStyle = fg;
    ctx.font = "bold " + (size/2.5) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.fillText(text,size/2,size/2);

    return canvas;
}

function generatePreview(){

    const preview = document.getElementById("previewCanvas");
    const ctx = preview.getContext("2d");

    const icon = drawIcon(192);

    ctx.clearRect(0,0,192,192);
    ctx.drawImage(icon,0,0);

    if(typeof ScreenReaderSpeak === "function"){
        ScreenReaderSpeak("Preview generated.");
    }
}

function downloadIcons(){

    const downloads = document.getElementById("downloads");
    downloads.innerHTML = "";

    [192,512].forEach(size => {

        const canvas = drawIcon(size);

        const link = document.createElement("a");
        link.download = "icon-" + size + ".png";
        link.href = canvas.toDataURL("image/png");

        link.innerText = "Download icon-" + size + ".png";

        downloads.appendChild(link);
        downloads.appendChild(document.createElement("br"));

    });

    if(typeof ScreenReaderSpeak === "function"){
        ScreenReaderSpeak("Download links created.");
    }
}

</script>

</body>
</html>
