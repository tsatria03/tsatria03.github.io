<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guess The Number</title>

<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#000000">
</head>

<body>

<div id="menuScreen">

<h1 id="menuTitle" tabindex="-1">GuessTheNumber</h1>

<p>
Welcome to GuessTheNumber! The computer will pick a random number. Guess it before you run out of tries.
</p>

<button onclick="startGame()">Start Game</button><br>
<button onclick="openSettings()">Change Settings</button><br><br>

</div>

<div id="settingsScreen">

<h3 id="settingsTitle" tabindex="-1">Game Settings</h3>

<label for="min">Minimum number</label><br>
<input type="number" id="min" value="1" min="1"><br><br>

<label for="max">Maximum number</label><br>
<input type="number" id="max" value="10" min="1"><br><br>

<label for="tries">Number of tries</label><br>
<input type="number" id="tries" value="5" min="1"><br><br>

<button onclick="showMenu()">Cancel</button><br><br>
<button onclick="closeSettings()">Save Settings</button><br><br>

</div>

<div id="gameArea">

<div id="notification-area" aria-live="assertive" aria-atomic="true"></div>

<label for="guessInput">Enter your guess</label><br>
<input type="number" id="guessInput" min="1"><br>

<button onclick="makeGuess()">Submit Guess</button><br><br>

</div>

<script src="modules/speech.js"></script>
<script src="modules/sound.js"></script>
<script src="game.js"></script>

<script>

window.addEventListener("load", async () => {
    SoundModule.init();
    SoundModule.preloadAll();
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            SoundModule.init();
        }
    });
    showMenu();
    if ("serviceWorker" in navigator)
    {
        try {
            const response = await fetch("./version.txt");
            const version = (await response.text()).trim();
            navigator.serviceWorker.register("./service-worker.js?v=" + version)
                .then(() => console.log("Service worker registered (version " + version + ")"))
                .catch(err => console.log("Service worker failed:", err));
        } catch (err) {
            console.log("Could not load version.txt, registering worker without version.");
            navigator.serviceWorker.register("./service-worker.js");
        }
    }
});

</script>

</body>
</html>
